<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>허브 설정 — 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root { --main:#2f2f33; --deep:#4e4e55; --dark:#3f3f45; --light:#8a8a93; --bg:#f2f2f2; --bg2:#f6f6f6; --border:#bebec1; --text:#5b5b5d; --sub:#88888c; --hero1:#f3f3f4; --hero2:#e1e1e2; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg2); color: #22222a; min-height: 100vh; }
.admin-wrap { max-width: 900px; margin: 0 auto; padding: 32px 20px 80px; }
.admin-header { background: linear-gradient(135deg, var(--main), var(--deep)); color: #fff; border-radius: 16px; padding: 28px 32px; margin-bottom: 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.admin-header h1 { font-size: 22px; font-weight: 700; }
.admin-header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
.admin-header a { color: #fff; font-size: 12px; opacity: 0.9; display: inline-block; margin-top: 6px; margin-right: 12px; }
.save-btn { background: #fff; color: var(--deep); font-weight: 700; font-size: 14px; padding: 12px 24px; border-radius: 10px; border: 0; cursor: pointer; font-family: inherit; }
.save-btn:hover { background: var(--bg2); }
.save-btn:disabled { opacity: 0.5; cursor: default; }
.logout-btn { background: rgba(255,255,255,0.25); color: #fff; border: 0; font-size: 12px; font-weight: 700; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-family: inherit; }
.admin-section { background: #fff; border-radius: 14px; border: 1px solid var(--border); padding: 28px; margin-bottom: 20px; }
.admin-section-title { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
label { font-size: 13px; font-weight: 700; color: #3a3a3e; display: block; margin-bottom: 6px; }
input[type=text], textarea { width: 100%; padding: 10px 14px; border: 1px solid #d4d4d6; border-radius: 8px; font-size: 14px; font-family: inherit; color: #22222a; background: #fff; outline: none; }
input:focus, textarea:focus { border-color: var(--main); }
textarea { resize: vertical; min-height: 70px; }
.hint { font-size: 12px; color: var(--sub); margin-top: 4px; }
.field-row { margin-bottom: 16px; }
.field-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.btn { padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: 0; font-family: inherit; }
.btn-green { background: var(--main); color: #fff; }
.color-picker-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
input[type=color] { width: 56px; height: 44px; padding: 0; border: 1px solid #d4d4d6; border-radius: 8px; background: #fff; cursor: pointer; }
.hex-input { width: 130px !important; font-family: monospace; text-transform: uppercase; }
.preset-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.preset { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px #ccc; cursor: pointer; }
.preset:hover { transform: scale(1.08); }
/* 미리보기 */
.hub-preview { margin-top: 18px; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.hp-inner { background: linear-gradient(165deg, var(--hero1), var(--hero2)); padding: 28px 20px; text-align: center; }
.hp-badge { display: inline-block; background: var(--main); color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 2px; padding: 4px 14px; border-radius: 999px; }
.hp-title { font-size: 22px; font-weight: 700; color: var(--dark); margin-top: 10px; }
.hp-sub { font-size: 12px; color: var(--text); margin-top: 6px; white-space: pre-line; }
.hp-cards { display: flex; gap: 10px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
.hp-card { background: rgba(255,255,255,0.8); border-radius: 10px; width: 120px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
.hp-media { width: 100%; height: 68px; background: var(--hero2); object-fit: cover; display: block; }
.hp-name { font-size: 11px; font-weight: 700; color: var(--dark); padding: 8px 6px; }
.hp-foot { font-size: 11px; color: var(--sub); margin-top: 16px; }
/* 로그인 */
#login-overlay { position: fixed; inset: 0; background: var(--bg2); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
.login-box { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 380px; }
.login-box h2 { font-size: 18px; color: var(--dark); margin-bottom: 6px; }
.login-box p { font-size: 13px; color: var(--sub); margin-bottom: 22px; }
.login-box input { margin-bottom: 12px; }
.login-box .btn-green { width: 100%; padding: 13px; font-size: 14px; }
#login-err { font-size: 13px; color: #c03030; margin-top: 12px; min-height: 18px; }
#app-body { display: none; }
.toast { position: fixed; bottom: 30px; right: 30px; background: var(--main); color: #fff; padding: 14px 24px; border-radius: 10px; font-size: 14px; font-weight: 700; opacity: 0; transition: opacity 0.3s; z-index: 9999; pointer-events: none; }
.toast.show { opacity: 1; }
@media (max-width: 700px) { .field-grid2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="login-overlay">
  <div class="login-box">
    <h2>🔒 관리자 로그인</h2>
    <p>허브(첫 화면)를 수정하려면 로그인이 필요해요.</p>
    <input type="text" id="login-email" placeholder="이메일" autocomplete="username">
    <input type="password" id="login-pw" placeholder="비밀번호" autocomplete="current-password"
           style="width:100%;padding:10px 14px;border:1px solid #d4d4d6;border-radius:8px;font-size:14px;font-family:inherit;">
    <button class="btn btn-green" id="login-btn" style="margin-top:8px;">로그인</button>
    <div id="login-err">스크립트를 불러오는 중...</div>
  </div>
</div>

<div id="app-body">
<div class="admin-wrap">

  <div class="admin-header">
    <div>
      <h1>🏠 허브(첫 화면) 설정</h1>
      <p id="load-status">불러오는 중...</p>
      <a href="index.html" target="_blank">🔗 첫 화면 미리보기</a>
      <a href="admin.html">⚙️ 커미션 설정으로</a>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="save-btn" id="save-btn" disabled>💾 저장</button>
      <button class="logout-btn" id="logout-btn">로그아웃</button>
    </div>
  </div>

  <div class="admin-section">
    <div class="admin-section-title">✏️ 텍스트</div>
    <div class="field-grid2">
      <div class="field-row"><label>배지</label><input type="text" id="hub-badge" placeholder="배지 문구"></div>
      <div class="field-row"><label>제목</label><input type="text" id="hub-title" placeholder="첫 화면 제목"></div>
    </div>
    <div class="field-row"><label>소개문</label><textarea id="hub-subtitle" placeholder="첫 화면 소개문"></textarea></div>
    <div class="field-row"><label>하단 문구</label><input type="text" id="hub-footer" placeholder="하단 경고문"></div>
    <div class="field-row"><label>브라우저 탭 제목</label><input type="text" id="hub-page_title" placeholder="첫 화면 제목"></div>
  </div>

  <div class="admin-section">
    <div class="admin-section-title">🎨 컬러</div>
    <div class="color-picker-row">
      <input type="color" id="hub-color-pick" value="#2f2f33">
      <input type="text" class="hex-input" id="hub-color" value="#2F2F33">
      <span class="hint">배경·제목 색이 이 색에서 자동 생성돼요.</span>
    </div>
    <div class="preset-row" id="preset-row"></div>

    <div class="hub-preview">
      <div class="hp-inner">
        <div class="hp-badge" id="hp-badge"></div>
        <div class="hp-title" id="hp-title"></div>
        <div class="hp-sub" id="hp-sub"></div>
        <div class="hp-cards" id="hp-cards"></div>
        <div class="hp-foot" id="hp-foot"></div>
      </div>
    </div>
  </div>

  <div class="admin-section">
    <div class="admin-section-title">🗂️ 등록된 커미션 카드</div>
    <div class="hint" style="margin-bottom:14px;">카드의 이름·색·설명·미리보기는 각 커미션의 <b>커미션 설정</b> 페이지에서 수정합니다.</div>
    <div id="site-list"></div>
  </div>

</div>
</div>
<div class="toast" id="toast">✅ 저장됐어요!</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, update, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

/* ============================================================
   ★★★ Firebase 설정 — 다른 파일들과 동일하게 맞춰주세요 ★★★
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBkEqi-OUK2In9Tku9dRw0ZqtJSHTNaloA",
  authDomain: "jiyul-commission-2e306.firebaseapp.com",
  databaseURL: "https://jiyul-commission-2e306-default-rtdb.firebaseio.com/",
  projectId: "jiyul-commission-2e306",
  storageBucket: "jiyul-commission-2e306.firebasestorage.app",
  messagingSenderId: "348428402333",
  appId: "1:348428402333:web:d1c5a1049618bf8cd61e74"
};
/* ============================================================ */

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const AUTH_ERR = {
  'auth/invalid-credential': '이메일 또는 비밀번호가 올바르지 않아요.',
  'auth/user-not-found': '등록되지 않은 이메일이에요.',
  'auth/invalid-email': '이메일 형식이 올바르지 않아요.',
  'auth/too-many-requests': '시도가 너무 많아요. 잠시 후 다시 시도해 주세요.',
  'auth/network-request-failed': '네트워크 오류예요.',
  'auth/operation-not-allowed': '이메일/비밀번호 로그인이 꺼져 있어요.',
  'auth/configuration-not-found': 'Firebase 콘솔 → Authentication → 시작하기 를 먼저 눌러주세요.',
  'auth/unauthorized-domain': '이 도메인이 Firebase 승인 목록에 없어요.'
};

const $ = id => document.getElementById(id);
const errEl = $('login-err');
errEl.textContent = '';

function doLogin() {
  const email = $('login-email').value.trim(), pw = $('login-pw').value;
  errEl.textContent = '';
  if (!email || !pw) { errEl.textContent = '이메일과 비밀번호를 입력해 주세요.'; return; }
  const b = $('login-btn'); b.disabled = true; b.textContent = '로그인 중...';
  signInWithEmailAndPassword(auth, email, pw)
    .catch(e => {
      console.error('[login]', e.code, e.message);
      errEl.textContent = (AUTH_ERR[e.code] || '로그인 실패') + '  [' + (e.code || '') + ']';
    })
    .finally(() => { b.disabled = false; b.textContent = '로그인'; });
}
$('login-btn').addEventListener('click', doLogin);
$('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$('logout-btn').addEventListener('click', () => signOut(auth).then(() => location.reload()));

let started = false;
onAuthStateChanged(auth, user => {
  if (!user) { $('login-overlay').style.display = 'flex'; $('app-body').style.display = 'none'; return; }
  $('login-overlay').style.display = 'none';
  $('app-body').style.display = 'block';
  if (!started) { started = true; start(); }
});

/* ---------- 팔레트 ---------- */
function hexToHsl(hex) {
  hex = (hex || '#2f2f33').replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  const r = parseInt(hex.substr(0,2),16)/255, g = parseInt(hex.substr(2,2),16)/255, b = parseInt(hex.substr(4,2),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h = 0, s = 0; const l = (max+min)/2; const d = max-min;
  if (d) {
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    if (max === r) h = ((g-b)/d + (g < b ? 6 : 0));
    else if (max === g) h = (b-r)/d + 2;
    else h = (r-g)/d + 4;
    h *= 60;
  }
  return { h, s, l };
}
function hslToHex(h, s, l) {
  s = Math.max(0, Math.min(1, s)); l = Math.max(0, Math.min(1, l));
  const c = (1 - Math.abs(2*l - 1)) * s, x = c * (1 - Math.abs((h/60) % 2 - 1)), m = l - c/2;
  let r=0,g=0,b=0;
  if (h < 60)      { r=c; g=x; }
  else if (h<120)  { r=x; g=c; }
  else if (h<180)  { g=c; b=x; }
  else if (h<240)  { g=x; b=c; }
  else if (h<300)  { r=x; b=c; }
  else             { r=c; b=x; }
  const to = v => Math.round((v+m)*255).toString(16).padStart(2,'0');
  return '#' + to(r) + to(g) + to(b);
}
const PRESETS = ['#2f2f33','#3a9a60','#e86a9a','#3a8ad0','#8a6ad0','#e88a3a','#d04a4a','#2aa8a0'];
function applyTheme(base) {
  const c = hexToHsl(base), h = c.h, s = c.s;
  const p = {
    main: base,
    deep:   hslToHex(h, Math.min(1, s*1.05), 0.32),
    dark:   hslToHex(h, Math.min(1, s*1.05), 0.26),
    light:  hslToHex(h, Math.min(1, s*0.95), 0.56),
    bg:     hslToHex(h, s*0.45, 0.95),
    bg2:    hslToHex(h, s*0.35, 0.965),
    border: hslToHex(h, s*0.50, 0.75),
    text:   hslToHex(h, s*0.30, 0.36),
    sub:    hslToHex(h, s*0.40, 0.54),
    hero1:  hslToHex(h, s*0.45, 0.955),
    hero2:  hslToHex(h, s*0.50, 0.885)
  };
  Object.keys(p).forEach(k => document.documentElement.style.setProperty('--' + k, p[k]));
}

/* ---------- 데이터 ---------- */
let HUB = {}, SITES = {};

function ytId(u) {
  const m = String(u || '').match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/);
  return m ? m[1] : null;
}
const isVid = u => /^data:video\//.test(u) || /\.(mp4|webm|mov)(\?|$)/i.test(u);
const esc = t => String(t || '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));

function mediaTag(u, cls) {
  if (!u) return '<div class="' + cls + '"></div>';
  const y = ytId(u);
  if (y) return '<img class="' + cls + '" src="https://img.youtube.com/vi/' + y + '/hqdefault.jpg">';
  if (isVid(u)) return '<video class="' + cls + '" src="' + esc(u) + '" autoplay muted loop playsinline></video>';
  return '<img class="' + cls + '" src="' + esc(u) + '">';
}

function drawPreview() {
  applyTheme($('hub-color').value || '#2f2f33');
  $('hp-badge').textContent = $('hub-badge').value || '';
  $('hp-badge').style.display = $('hub-badge').value ? '' : 'none';
  $('hp-title').textContent = $('hub-title').value || '(제목 없음)';
  $('hp-sub').textContent = $('hub-subtitle').value || '';
  $('hp-foot').textContent = $('hub-footer').value || '';
  const keys = Object.keys(SITES)
    .filter(k => SITES[k] && SITES[k].visible !== false && SITES[k].published !== false)
    .sort((a, b) => (SITES[a].order || 0) - (SITES[b].order || 0));
  $('hp-cards').innerHTML = keys.map(k => {
    const s = SITES[k];
    return '<div class="hp-card">' + mediaTag(s.preview, 'hp-media') +
           '<div class="hp-name">' + esc(s.name || k) + '</div></div>';
  }).join('');
}

function renderSiteList() {
  const keys = Object.keys(SITES).sort((a, b) => (SITES[a].order || 0) - (SITES[b].order || 0));
  $('site-list').innerHTML = keys.length ? keys.map(k => {
    const s = SITES[k];
    const pub = s.published !== false;
    const shown = s.visible !== false;
    return '<div style="display:flex;align-items:center;gap:14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:10px;flex-wrap:wrap;">' +
      '<span style="width:12px;height:12px;border-radius:50%;background:' + esc(s.color || '#2f2f33') + ';flex-shrink:0;"></span>' +
      '<div style="flex:1;min-width:180px;"><b style="font-size:14px;color:var(--dark);">' + esc(s.name || k) + '</b> ' +
      '<span style="font-size:12px;color:var(--sub);">(' + esc(k) + ')</span>' +
      '<div style="font-size:12px;color:var(--sub);">' +
        (pub ? '🟢 공개' : '⚫ 비공개') + ' · ' + (shown ? '카드 표시' : '카드 숨김') +
        ' · 순서 ' + (s.order != null ? s.order : '-') +
        ' · 미리보기 ' + (s.preview ? '있음' : '없음') + '</div></div>' +
      '<button class="btn" data-toggle="' + esc(k) + '" style="background:' + (pub ? '#eee' : 'var(--main)') + ';color:' + (pub ? '#666' : '#fff') + ';">' +
        (pub ? '비공개로' : '공개로') + '</button>' +
      '<a class="btn btn-green" style="text-decoration:none;" href="admin.html?site=' + esc(k) + '">수정</a>' +
      '<button class="btn" data-del="' + esc(k) + '" style="background:#e84040;color:#fff;">삭제</button>' +
    '</div>';
  }).join('') : '<div class="hint">등록된 커미션이 없어요. init.html에서 추가해 주세요.</div>';
}

$('site-list').addEventListener('click', e => {
  const t = e.target.getAttribute('data-toggle');
  const d = e.target.getAttribute('data-del');

  if (t) {
    const nowPub = SITES[t].published !== false;
    e.target.disabled = true;
    update(ref(db, '_sites/' + t), { published: !nowPub })
      .then(() => {
        SITES[t].published = !nowPub;
        renderSiteList();
        drawPreview();
      })
      .catch(err => { e.target.disabled = false; alert('변경 실패: ' + err.message); });
    return;
  }

  if (d) {
    const name = (SITES[d] && SITES[d].name) || d;
    const typed = prompt('"' + d + '" 커미션의 모든 데이터를 영구히 삭제합니다.\n되돌릴 수 없어요.\n\n계속하려면 사이트 키를 그대로 입력하세요:');
    if (typed === null) return;
    if (typed.trim() !== d) { alert('사이트 키가 일치하지 않아요. 삭제를 취소했습니다.'); return; }
    Promise.all([ remove(ref(db, d)), remove(ref(db, '_sites/' + d)) ])
      .then(() => {
        delete SITES[d];
        renderSiteList();
        drawPreview();
        alert('"' + name + '" 삭제됐어요.');
      })
      .catch(err => alert('삭제 실패: ' + err.message));
  }
});

function start() {
  onValue(ref(db, '_hub'), snap => {
    HUB = snap.val() || {};
    $('hub-badge').value = HUB.badge || '';
    $('hub-title').value = HUB.title || '';
    $('hub-subtitle').value = HUB.subtitle || '';
    $('hub-footer').value = HUB.footer || '';
    $('hub-page_title').value = HUB.page_title || '';
    const c = HUB.color || '#2f2f33';
    $('hub-color').value = c.toUpperCase();
    $('hub-color-pick').value = c;
    drawPreview();
    $('load-status').textContent = '불러오기 완료 ✅';
    $('save-btn').disabled = false;
  }, { onlyOnce: true });

  onValue(ref(db, '_sites'), snap => {
    SITES = snap.val() || {};
    renderSiteList();
    drawPreview();
  }, { onlyOnce: true });
}

['hub-badge','hub-title','hub-subtitle','hub-footer'].forEach(id => $(id).addEventListener('input', drawPreview));
$('hub-color-pick').addEventListener('input', e => { $('hub-color').value = e.target.value.toUpperCase(); drawPreview(); });
$('hub-color').addEventListener('input', e => {
  const v = e.target.value;
  if (!/^#?[0-9a-fA-F]{6}$/.test(v)) return;
  $('hub-color-pick').value = v[0] === '#' ? v : '#' + v;
  drawPreview();
});
$('preset-row').innerHTML = PRESETS.map(c => '<div class="preset" style="background:' + c + '" data-c="' + c + '"></div>').join('');
$('preset-row').addEventListener('click', e => {
  const c = e.target.getAttribute('data-c');
  if (!c) return;
  $('hub-color').value = c.toUpperCase();
  $('hub-color-pick').value = c;
  drawPreview();
});

$('save-btn').addEventListener('click', () => {
  const b = $('save-btn');
  b.disabled = true; b.textContent = '저장 중...';
  set(ref(db, '_hub'), {
    badge: $('hub-badge').value,
    title: $('hub-title').value,
    subtitle: $('hub-subtitle').value,
    footer: $('hub-footer').value,
    page_title: $('hub-page_title').value,
    color: $('hub-color').value || '#2f2f33'
  }).then(() => {
    b.disabled = false; b.textContent = '💾 저장';
    const t = $('toast'); t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }).catch(e => {
    b.disabled = false; b.textContent = '💾 저장';
    alert('저장 실패: ' + e.message + '\n\nDB 규칙에 이 계정 UID가 등록됐는지 확인해 주세요.');
  });
});
</script>
</body>
</html>
