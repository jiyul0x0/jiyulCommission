<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커미션</title>
<style>
  @font-face{font-family:'Paperlogy';font-weight:400;font-style:normal;font-display:swap;src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');}
  @font-face{font-family:'Paperlogy';font-weight:500;font-style:normal;font-display:swap;src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');}
  @font-face{font-family:'Paperlogy';font-weight:600;font-style:normal;font-display:swap;src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');}
  @font-face{font-family:'Paperlogy';font-weight:700;font-style:normal;font-display:swap;src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');}
  @font-face{font-family:'Paperlogy';font-weight:800;font-style:normal;font-display:swap;src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');}
  @font-face{font-family:'Paperlogy';font-weight:900;font-style:normal;font-display:swap;src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');}
/* ===== 테마 컬러 (관리자에서 메인 컬러 1개로 자동 생성) ===== */
:root {
  --main:   #2f2f33;
  --deep:   #4e4e55;
  --dark:   #3f3f45;
  --light:  #8a8a93;
  --bg:     #f2f2f2;
  --bg2:    #f6f6f6;
  --border: #bebec1;
  --text:   #5b5b5d;
  --sub:    #88888c;
  --hero1:  #f3f3f4;
  --hero2:  #e1e1e2;
  --main-rgb: 47,47,51;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; background: #fff; font-family: 'Paperlogy', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #0a1e0e; line-height: 1.6; overflow-x: hidden; }
/* 테마 컬러가 적용되기 전까지 감춰서 색 깜빡임 방지 */
body { opacity: 0; transition: opacity 0.35s ease; }
body.ready { opacity: 1; }
.page { width: 100%; background: #fff; }

/* 히어로 */
.hero { width: 100%; background: linear-gradient(150deg, var(--hero1) 0%, var(--hero2) 50%, var(--hero1) 100%); padding: 72px 0 56px; text-align: center; border-bottom: 2px solid var(--border); position: relative; overflow: hidden; }
/* 네비게이션 */
.gnav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--bg2); box-shadow: 0 1px 12px rgba(0,0,0,0.04); }
.gnav-spacer { height: 0; }
.gnav-inner { display: flex; align-items: center; justify-content: space-between; padding: 13px 80px; position: relative; }
.gnav-brand { font-family: 'Paperlogy', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; font-weight: 800; color: var(--dark); text-decoration: none; }
.gnav-toggle { display: none; background: none; border: 1px solid var(--border); color: var(--dark); border-radius: 8px; padding: 6px 12px; font-size: 13px; font-family: inherit; cursor: pointer; }
.gnav-list { display: flex; gap: 26px; list-style: none; margin: 0; padding: 0; }
.gnav-list a { font-size: 13.5px; font-weight: 500; color: var(--sub); text-decoration: none; padding: 3px 0; position: relative; transition: color 0.2s; }
.gnav-list a::after { content: ''; position: absolute; left: 0; bottom: -2px; width: 0; height: 2px; background: var(--main); border-radius: 2px; transition: width 0.25s ease; }
.gnav-list a:hover, .gnav-list a.active { color: var(--dark); }
.gnav-list a:hover::after, .gnav-list a.active::after { width: 100%; }
.section, .hero { scroll-margin-top: 62px; }

.hero-inner { position: relative; z-index: 1; padding: 0 20px; }
.back-btn { position: absolute; top: 24px; left: 28px; z-index: 3; display: none; align-items: center; gap: 6px; background: rgba(255,255,255,0.8); border: 1px solid var(--border); color: var(--dark); font-size: 13px; font-weight: 700; padding: 8px 16px; border-radius: 999px; text-decoration: none; transition: background 0.15s, transform 0.15s; }
.back-btn:hover { background: #fff; transform: translateX(-3px); }
.footer-back { display: none; margin-top: 16px; }
.footer-back a { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.7); border: 1px solid var(--border); color: var(--dark); font-size: 13px; font-weight: 700; padding: 9px 20px; border-radius: 999px; text-decoration: none; transition: background 0.15s; }
.footer-back a:hover { background: #fff; }
.hero-badge { display: inline-block; background: var(--main); color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 3px; padding: 6px 20px; border-radius: 999px; margin-bottom: 22px; }
.hero-name { font-family: 'Paperlogy', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 48px; font-weight: 800; color: var(--dark); margin-bottom: 8px; letter-spacing: -1.5px; }
.hero-en { font-size: 14px; color: var(--text); letter-spacing: 5px; margin-bottom: 20px; font-weight: 500; }
.hero-sub { font-size: 15px; color: var(--text); line-height: 2.2; margin-bottom: 28px; }
.hero-tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
.tag { background: rgba(var(--main-rgb),0.1); color: var(--dark); font-size: 13px; padding: 6px 18px; border-radius: 999px; border: 1px solid rgba(var(--main-rgb),0.3); font-weight: 500; }

/* 섹션 */
.section { padding: 56px 80px; border-bottom: 1px solid var(--bg2); }
.section-title { font-size: 20px; font-weight: 700; color: var(--dark); margin-bottom: 6px; display: flex; align-items: center; gap: 12px; }
.section-title::before { content: ''; display: inline-block; width: 5px; height: 22px; background: linear-gradient(180deg, var(--light), var(--main)); border-radius: 3px; flex-shrink: 0; }
.section-subtitle { font-size: 13px; color: var(--sub); margin-bottom: 32px; padding-left: 17px; }

/* 공지 */
.notice-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.notice-card { border: 1px solid var(--border); border-radius: 14px; padding: 22px 20px; background: var(--bg); }
.notice-card-title { font-size: 14px; font-weight: 700; color: var(--dark); margin-bottom: 10px; }
.notice-card-body { font-size: 13px; color: var(--text); line-height: 1.9; word-break: keep-all; }
.notice-card--warn { background: #fff5f5; border-color: #f0a0a0; }
.notice-card--warn .notice-card-title { color: #c03030; }

/* 예약현황 */
.status-wrap { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.status-item { border-radius: 14px; padding: 22px 16px; text-align: center; }
.status-open   { background: var(--bg); border: 1px solid var(--border); }
.status-wait   { background: #fff8e0; border: 1px solid #f5c842; }
.status-closed { background: #f5f5f5; border: 1px solid #ccc; }
.status-dot { font-size: 22px; margin-bottom: 8px; }
.status-label { font-size: 13px; font-weight: 700; }
.status-open   .status-label { color: var(--dark); }
.status-wait   .status-label { color: #806000; }
.status-closed .status-label { color: #555; }
.status-desc { font-size: 12px; margin-top: 5px; }
.status-open   .status-desc { color: var(--main); }
.status-wait   .status-desc { color: #a07800; }
.status-closed .status-desc { color: #888; }

/* 진행방식 */
.steps { display: flex; flex-direction: column; }
.step { display: flex; gap: 22px; align-items: flex-start; padding: 24px 0; border-bottom: 1px solid var(--bg2); }
.step:last-child { border-bottom: none; }
.step-num { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--light), var(--deep)); color: #fff; font-size: 18px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 3px 10px rgba(var(--main-rgb),0.25); }
.step-content h4 { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 6px; }
.step-content p { font-size: 13px; color: var(--text); line-height: 1.9; }

/* 협업작가 */
.collab-grid { display: flex; flex-direction: column; gap: 20px; }
.collab-card { display: flex; gap: 24px; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
.collab-img { width: 100px; height: 100px; min-width: 100px; border-radius: 12px; object-fit: cover; background: var(--hero2); display: block; }
.collab-img-empty { width: 100px; height: 100px; min-width: 100px; border-radius: 12px; background: var(--hero2); display: flex; align-items: center; justify-content: center; color: var(--sub); font-size: 12px; }
.collab-info { flex: 1; }
.collab-name { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
.collab-label { font-size: 11px; font-weight: 700; color: var(--sub); letter-spacing: 1px; margin-bottom: 2px; }
.collab-main { font-size: 14px; color: var(--text); margin-bottom: 6px; }
.collab-sub { font-size: 13px; color: var(--sub); line-height: 1.7; }

/* 가격표 */
.price-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.price-table thead th { background: var(--bg2); color: var(--dark); padding: 13px 20px; text-align: left; font-weight: 700; font-size: 13px; border-bottom: 2px solid var(--border); }
.price-table thead th:last-child { text-align: right; }
.price-table td { padding: 14px 20px; border-bottom: 1px solid var(--bg2); vertical-align: middle; }
.price-table td:last-child { text-align: right; font-weight: 700; color: var(--main); white-space: nowrap; }
.price-table tbody tr:hover td { background: var(--bg); }
.price-cat td { font-size: 12px; font-weight: 700; color: var(--sub); background: var(--bg); letter-spacing: 1px; padding: 10px 20px; border-bottom: none; }
.price-badge { display: inline-block; font-size: 11px; background: var(--hero2); color: var(--dark); padding: 3px 10px; border-radius: 999px; margin-left: 8px; font-weight: 500; }
.price-sub { font-size: 13px; color: var(--text); }
.price-note { font-size: 13px; color: var(--text); margin-top: 20px; padding: 14px 20px; background: var(--bg); border-radius: 10px; border-left: 4px solid var(--light); line-height: 2; }

/* 샘플 */
.sample-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
.sample-card { border-radius: 14px; border: 1px solid var(--border); overflow: hidden; background: var(--bg); }
.sample-video { position: relative; width: 100%; padding-top: 56.25%; }
.sample-video iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
.sample-thumb { width: 100%; object-fit: cover; display: block; }
.sample-thumb-empty { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; background: var(--hero2); color: var(--sub); font-size: 13px; }
.sample-title { padding: 12px 16px; font-size: 13px; font-weight: 700; color: var(--dark); text-align: center; }

/* FAQ */
.faq-list { display: flex; flex-direction: column; gap: 14px; }
.faq-item { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.faq-q { display: flex; align-items: flex-start; gap: 12px; padding: 16px 18px; background: var(--bg); font-size: 14px; font-weight: 700; color: var(--dark); }
.faq-q-mark { width: 26px; height: 26px; border-radius: 50%; background: var(--main); color: #fff; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.faq-a-mark { width: 26px; height: 26px; border-radius: 50%; background: var(--hero2); color: var(--main); font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.faq-a { display: flex; align-items: flex-start; gap: 12px; padding: 14px 18px; background: #fff; font-size: 13px; color: var(--text); line-height: 1.9; border-top: 1px solid var(--bg2); word-break: keep-all; }

/* 환불 */
.refund-intro { font-size: 13px; color: var(--text); line-height: 1.9; margin-bottom: 20px; padding: 14px 20px; background: var(--bg); border-radius: 10px; border-left: 4px solid var(--light); word-break: keep-all; }
.refund-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.refund-table th { background: var(--bg2); color: var(--dark); padding: 12px 20px; font-weight: 700; font-size: 13px; border-bottom: 2px solid var(--border); text-align: center; }
.refund-table td { padding: 13px 20px; border-bottom: 1px solid var(--bg2); text-align: center; }
.refund-full    { color: var(--dark); font-weight: 700; }
.refund-partial { color: #806000; font-weight: 700; }
.refund-none    { color: #c03030; font-weight: 700; }

/* 견적 계산기 */
.quote-cat { font-size: 12px; font-weight: 700; color: var(--sub); background: var(--bg); padding: 10px 18px; letter-spacing: 1px; border-bottom: 1px solid var(--bg2); }
.qhead { display: grid; grid-template-columns: 1fr 110px 90px; gap: 8px; background: var(--bg2); padding: 11px 18px; font-size: 12px; font-weight: 700; color: var(--dark); }
.qhead div:nth-child(2) { text-align: right; }
.qhead div:nth-child(3) { text-align: center; }
.qname { font-size: 14px; font-weight: 700; color: var(--dark); }
.qbadge { display: inline-block; font-size: 11px; background: var(--hero2); color: var(--dark); padding: 2px 8px; border-radius: 999px; margin-left: 6px; font-weight: 500; }
.qdesc { font-size: 12px; color: var(--sub); margin-top: 3px; }
.qprice { font-size: 13px; font-weight: 700; color: var(--main); text-align: right; white-space: nowrap; }
.qty { width: 100%; max-width: 70px; margin: 0 auto; display: block; padding: 7px; border: 1px solid var(--border); border-radius: 8px; text-align: center; font-size: 14px; font-family: inherit; color: #0a1e0e; outline: none; }
.qty:focus { border-color: var(--main); }
.qty:disabled { opacity: 0.3; cursor: not-allowed; }
.qtotal { display: flex; justify-content: space-between; align-items: center; background: var(--main); color: #fff; padding: 18px 22px; }
.qtotal-label { font-size: 14px; font-weight: 700; }
.qtotal-amount { font-size: 22px; font-weight: 800; }
@media (max-width: 768px) {
  .qhead, .qrow { grid-template-columns: 1fr 84px 62px; gap: 6px; padding: 11px 12px; }
  .qname { font-size: 13px; word-break: keep-all; }
  .qprice { font-size: 12px; }
  .qty { max-width: 52px; padding: 5px; font-size: 13px; }
  .qtotal { padding: 15px 16px; }
  .qtotal-amount { font-size: 18px; }
}

.label-multi { font-size: 12px; font-weight: 500; color: var(--sub); margin-left: 6px; }

/* 신청 양식 */
.apply-intro { font-size: 13px; color: var(--text); line-height: 1.9; margin-bottom: 24px; padding: 16px 20px; background: var(--bg); border-radius: 12px; border-left: 4px solid var(--light); word-break: keep-all; }
.apply-fields { display: flex; flex-direction: column; gap: 22px; }
.afield > label { display: block; font-size: 14px; font-weight: 700; color: var(--dark); margin-bottom: 9px; }
.afield-hint { font-size: 12px; color: var(--sub); margin-top: 6px; line-height: 1.6; }
.afield input[type=text], .afield textarea { width: 100%; border: 1px solid var(--border); background: #fff; border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: inherit; color: #0a1e0e; outline: none; transition: border-color 0.15s; }
.afield textarea { resize: vertical; min-height: 84px; }
.afield input:focus, .afield textarea:focus { border-color: var(--main); }
.afield input::placeholder, .afield textarea::placeholder { color: var(--sub); }
.pillrow { display: flex; gap: 8px; flex-wrap: wrap; }
.pill { border: 1px solid var(--border); background: #fff; color: var(--text); font-family: inherit; font-weight: 500; font-size: 13px; padding: 8px 16px; border-radius: 10px; cursor: pointer; transition: 0.15s; }
.pill:hover { border-color: var(--main); color: var(--dark); }
.pill.on { background: var(--bg); border-color: var(--main); color: var(--dark); font-weight: 700; }
.apply-agree { display: flex; align-items: flex-start; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; font-size: 13px; color: var(--text); margin-top: 24px; cursor: pointer; }
.apply-agree input { margin-top: 3px; width: 16px; height: 16px; accent-color: var(--main); flex-shrink: 0; }
.apply-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }
.apply-btn { border-radius: 10px; padding: 13px 26px; font-weight: 700; font-size: 14px; font-family: inherit; cursor: pointer; border: 1px solid var(--main); transition: 0.18s; }
.apply-btn.primary { background: var(--main); color: #fff; }
.apply-btn.primary:hover { background: var(--deep); }
.apply-btn.ghost { background: #fff; color: var(--main); }
.apply-btn.ghost:hover { background: var(--bg); }
.apply-toast { text-align: center; font-size: 13px; font-weight: 700; color: var(--main); min-height: 20px; margin-top: 14px; opacity: 0; transition: opacity 0.2s; }
.apply-toast.show { opacity: 1; }
.apply-toast.err { color: #c03030; }

/* 견적 계산 */
.quote-wrap { margin-top: 30px; padding-top: 26px; border-top: 1px solid var(--bg2); }
.quote-head { font-size: 13px; font-weight: 700; color: var(--dark); margin-bottom: 16px; }
.qgroup { margin-bottom: 20px; }
.qgroup-name { font-size: 12px; font-weight: 700; color: var(--sub); letter-spacing: 0.5px; margin-bottom: 9px; }
.qrow { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border: 1px solid var(--bg2); border-radius: 12px; background: #fff; margin-bottom: 8px; transition: 0.15s; }
.qrow.on { border-color: var(--main); background: var(--bg); }
.qrow input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--main); cursor: pointer; flex-shrink: 0; }
.qrow-label { flex: 1; font-size: 13.5px; color: #0a1e0e; word-break: keep-all; cursor: pointer; }
.qrow-label small { display: block; font-size: 12px; color: var(--sub); margin-top: 2px; }
.qrow-price { flex-shrink: 0; font-size: 12.5px; font-weight: 700; color: var(--main); white-space: nowrap; }
.qrow-base { flex-shrink: 0; font-size: 11px; font-weight: 700; color: var(--sub); background: var(--bg2); padding: 3px 9px; border-radius: 999px; }
.qty-box { flex-shrink: 0; display: flex; align-items: center; border: 1px solid var(--border); border-radius: 9px; overflow: hidden; background: #fff; }
.qty-box button { width: 30px; height: 30px; border: 0; background: none; color: var(--text); font-size: 16px; cursor: pointer; font-family: inherit; }
.qty-box button:hover { background: var(--bg); }
.qty-box span { min-width: 26px; text-align: center; font-size: 13px; font-weight: 700; color: var(--dark); }
.quote-box { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; margin-top: 20px; }
.quote-line { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; padding: 9px 0; border-bottom: 1px dashed var(--border); font-size: 13px; color: var(--text); }
.quote-line b { flex-shrink: 0; color: var(--dark); font-weight: 700; white-space: nowrap; }
.quote-total { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; padding-top: 16px; margin-top: 6px; border-top: 2px solid var(--border); }
.quote-total span { font-size: 14px; font-weight: 700; color: var(--dark); }
.quote-total strong { font-size: 24px; font-weight: 800; color: var(--main); letter-spacing: -0.5px; }
.quote-note { font-size: 12px; color: var(--sub); margin-top: 10px; line-height: 1.7; }
.label-multi { font-size: 12px; font-weight: 500; color: var(--sub); margin-left: 6px; }

/* 푸터 */
.footer-sec { background: linear-gradient(160deg, var(--hero1) 0%, var(--hero2) 100%); padding: 48px 80px; text-align: center; border-top: 2px solid var(--border); }
.footer-name { font-family: 'Paperlogy', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 22px; font-weight: 800; color: var(--dark); margin-bottom: 10px; }
.footer-body { font-size: 13px; color: var(--text); line-height: 2.2; }
.footer-warn { display: inline-block; margin-top: 12px; font-size: 12px; color: var(--dark); }

/* 비공개 안내 */
.private { min-height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px; background: linear-gradient(150deg, var(--hero1), var(--hero2)); }
.private-icon { font-size: 40px; margin-bottom: 18px; }
.private h2 { font-family: 'Paperlogy', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 26px; font-weight: 800; color: var(--dark); margin-bottom: 10px; }
.private p { font-size: 14px; color: var(--text); line-height: 1.9; }
.private a { display: inline-block; margin-top: 24px; background: var(--main); color: #fff; font-size: 13px; font-weight: 700; padding: 11px 24px; border-radius: 999px; text-decoration: none; }

/* 반응형 */
@media (max-width: 768px) {
  .gnav-inner { padding: 12px 20px; }
  .gnav-toggle { display: inline-flex; }
  .gnav-list { position: absolute; top: 100%; left: 0; width: 100%; flex-direction: column; gap: 0; background: #fff; border-bottom: 1px solid var(--bg2); max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .gnav-list.open { max-height: 480px; }
  .gnav-list li { width: 100%; }

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

/* ============================================================
   ★★★ 새 커미션 사이트를 만들 때는 이 부분만 교체하세요 ★★★
   (Firebase 콘솔 → 프로젝트 설정 → 내 앱 → SDK 설정)
   site.html / index.html / admin.html / init.html 네 파일 모두 동일하게!
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBkEqi-OUK2In9Tku9dRw0ZqtJSHTNaloA",
  authDomain: "jiyul-commission-2e306.firebaseapp.com",
  databaseURL: "https://jiyul-commission-2e306-default-rtdb.firebaseio.com/",
  projectId: "jiyul-commission-2e306",
  storageBucket: "jiyul-commission-2e306.firebasestorage.app",
  messagingSenderId: "348428402333",
  appId: "1:348428402333:web:d1c5a1049618bf8cd61e74"
};
/* ============================================================ */

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* 여러 커미션을 한 Firebase에서 운영 — URL ?site=키 로 구분
   예) site.html?site=illust  →  DB의 illust 노드를 읽음
   파라미터가 없으면 commission 노드를 읽습니다. */
const SITE_KEY = (new URLSearchParams(location.search).get('site') || 'commission').replace(/[^a-zA-Z0-9_-]/g, '');
const STATUS_ICONS = { open: '✅', wait: '⏳', closed: '🚫' };

/* ---------- 메인 컬러 1개 → 팔레트 자동 생성 ---------- */
function hexToHsl(hex) {
  hex = (hex || '#2f2f33').replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  const r = parseInt(hex.substr(0,2),16)/255, g = parseInt(hex.substr(2,2),16)/255, b = parseInt(hex.substr(4,2),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h = 0, s = 0; const l = (max+min)/2; const d = max-min;
  if (d) {
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    if (max === r) h = ((g-b)/d + (g < b ? 6 : 0));
    else if (max === g) h = (b-r)/d + 2;
    else h = (r-g)/d + 4;
    h *= 60;
  }
  return { h: h, s: s, l: l };
}
function hslToHex(h, s, l) {
  s = Math.max(0, Math.min(1, s)); l = Math.max(0, Math.min(1, l));
  const c = (1 - Math.abs(2*l - 1)) * s, x = c * (1 - Math.abs((h/60) % 2 - 1)), m = l - c/2;
  let r=0,g=0,b=0;
  if (h < 60)      { r=c; g=x; }
  else if (h<120)  { r=x; g=c; }
  else if (h<180)  { g=c; b=x; }
  else if (h<240)  { g=x; b=c; }
  else if (h<300)  { r=x; b=c; }
  else             { r=c; b=x; }
  const to = v => Math.round((v+m)*255).toString(16).padStart(2,'0');
  return '#' + to(r) + to(g) + to(b);
}
function hexToRgbStr(hex) {
  hex = (hex || '#2f2f33').replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return parseInt(hex.substr(0,2),16)+','+parseInt(hex.substr(2,2),16)+','+parseInt(hex.substr(4,2),16);
}
window.genPalette = function(base) {
  const c = hexToHsl(base), h = c.h, s = c.s;
  return {
    main:   base,
    deep:   hslToHex(h, Math.min(1, s*1.05), 0.32),
    dark:   hslToHex(h, Math.min(1, s*1.05), 0.26),
    light:  hslToHex(h, Math.min(1, s*0.95), 0.56),
    bg:     hslToHex(h, s*0.45, 0.95),
    bg2:    hslToHex(h, s*0.35, 0.965),
    border: hslToHex(h, s*0.50, 0.75),
    text:   hslToHex(h, s*0.30, 0.36),
    sub:    hslToHex(h, s*0.40, 0.54),
    hero1:  hslToHex(h, s*0.45, 0.955),
    hero2:  hslToHex(h, s*0.50, 0.885)
  };
};
window.applyTheme = function(base, root) {
  const p = window.genPalette(base || '#2f2f33');
  const el = root || document.documentElement;
  Object.keys(p).forEach(k => el.style.setProperty('--'+k, p[k]));
  el.style.setProperty('--main-rgb', hexToRgbStr(p.main));
  return p;
};

/* ---------- 기본값 (DB에 값이 없을 때 대비) ---------- */
const DEF_SITE = {
  page_title: '커미션', badge: 'COMMISSION', name: '커미션', en: 'COMMISSION',
  desc: '', tags: [], footer_name: '', footer_body: '', footer_warn: ''
};
const DEF_SECTIONS = {
  notice:  { visible: true, title: '공지사항',        subtitle: '', order: 0 },
  status:  { visible: true, title: '예약 현황',        subtitle: '', order: 1 },
  process: { visible: true, title: '진행 방식',        subtitle: '', order: 2 },
  collab:  { visible: false, title: '협업 작가',       subtitle: '', order: 3 },
  price:   { visible: true, title: '가격표',          subtitle: '', note: '', head1: '작업 항목', head2: '포함 내용', head3: '가격', order: 4 },
  sample:  { visible: true, title: '포트폴리오 · 샘플', subtitle: '', order: 5 },
  faq:     { visible: true, title: '자주 묻는 질문',   subtitle: '', order: 6 },
  refund:  { visible: true, title: '환불 정책',        subtitle: '', head1: '작업 단계', head2: '환불 비율', order: 7 },
  apply:   { visible: true, title: '신청 양식',        subtitle: '', order: 8 }
};

/* 관리자에서 드래그한 순서대로 섹션 DOM 재배치 */
function orderedKeys(sec) {
  return Object.keys(sec).sort(function(a, b) {
    var oa = sec[a].order, ob = sec[b].order;
    return (oa == null ? 99 : oa) - (ob == null ? 99 : ob);
  });
}
function applySectionOrder(sec) {
  const page = document.querySelector('.page');
  const footer = page.querySelector('.footer-sec');
  if (!page || !footer) return;
  orderedKeys(sec).forEach(function(k) {
    const el = document.getElementById('sec-' + k);
    if (el) page.insertBefore(el, footer);
  });
}

function getYoutubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/);
  return m ? m[1] : null;
}
const nl = t => (t || '').replace(/\n/g, '<br>');
let _spy = null;
function buildNav(sec, brand) {
  const keys = orderedKeys(sec).filter(k => sec[k].visible !== false && sec[k].title);
  const nav = document.getElementById('gnav');
  const spacer = document.getElementById('gnav-spacer');
  if (keys.length < 2) { nav.style.display = 'none'; spacer.style.height = '0px'; return; }

  nav.style.display = '';
  document.getElementById('gnav-brand').textContent = brand;
  document.getElementById('gnav-list').innerHTML = keys
    .map(k => '<li><a href="#sec-' + k + '" data-nav>' + (sec[k].title) + '</a></li>')
    .join('');

  const list = document.getElementById('gnav-list');
  const toggle = document.getElementById('gnav-toggle');
  toggle.onclick = () => {
    const open = list.classList.toggle('open');
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  };
  list.querySelectorAll('a').forEach(a => {
    a.onclick = () => { list.classList.remove('open'); toggle.setAttribute('aria-expanded', 'false'); };
  });

  // 고정 네비 높이만큼 본문을 밀어줌
  const syncSpacer = () => { spacer.style.height = nav.offsetHeight + 'px'; };
  syncSpacer();
  window.addEventListener('resize', syncSpacer);

  // 현재 보고 있는 섹션 표시
  if (_spy) _spy.disconnect();
  const links = list.querySelectorAll('[data-nav]');
  _spy = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      links.forEach(a => a.classList.remove('active'));
      const m = list.querySelector('[data-nav][href="#' + e.target.id + '"]');
      if (m) m.classList.add('active');
    });
  }, { rootMargin: '-45% 0px -45% 0px' });
  keys.forEach(k => {
    const el = document.getElementById('sec-' + k);
    if (el) _spy.observe(el);
  });
}

function setSection(key, sec) {
  const el = document.getElementById('sec-' + key);
  if (el) el.style.display = sec.visible === false ? 'none' : '';
  const t = document.getElementById('t-' + key); if (t) t.textContent = sec.title || '';
  const s = document.getElementById('s-' + key); if (s) s.textContent = sec.subtitle || '';
}

onValue(ref(db, SITE_KEY), function(snapshot) {
  if (window.__private) return;
  const d = snapshot.val();
  if (!d) return;

  // 0. 테마
  window.applyTheme((d.theme && d.theme.main) || '#2f2f33');

  // 0-1. 사이트 기본 정보
  const site = Object.assign({}, DEF_SITE, d.site || {});
  document.title = site.page_title || site.name;
  document.getElementById('hero-badge').textContent = site.badge || '';
  document.getElementById('hero-badge').style.display = site.badge ? '' : 'none';
  document.getElementById('hero-name').textContent = site.name || '';
  document.getElementById('hero-en').textContent = site.en || '';

  const at = (d.notice && d.notice.answer_time) || '';
  document.getElementById('hero-sub').innerHTML =
    nl(site.desc) + (at ? (site.desc ? '<br>' : '') + '문의 답변 시간 : ' + at : '');

  const tags = site.tags || [];
  document.getElementById('hero-tags').innerHTML =
    tags.map(t => '<span class="tag"># ' + t + '</span>').join('');

  document.getElementById('footer-name').textContent = site.footer_name || site.name || '';
  document.getElementById('footer-body').innerHTML = nl(site.footer_body);
  document.getElementById('footer-warn').textContent = site.footer_warn || '';

  // 0-2. 섹션 제목 / 부제 / 표시여부
  const sec = {};
  Object.keys(DEF_SECTIONS).forEach(k => {
    sec[k] = Object.assign({}, DEF_SECTIONS[k], (d.sections && d.sections[k]) || {});
    setSection(k, sec[k]);
  });
  // 0-3. 섹션 순서 반영 → 네비게이션 (표시 중인 섹션만)
  applySectionOrder(sec);
  buildNav(sec, site.name || '');

  // 공지 부제엔 답변시간 자동 추가
  if (at) {
    const base = sec.notice.subtitle;
    document.getElementById('s-notice').textContent =
      (base ? base + ' · ' : '') + '문의 답변 시간 : ' + at;
  }

  // 1. 공지
  const ng = document.getElementById('notice-grid'); ng.innerHTML = '';
  ((d.notice && d.notice.items) || []).forEach(n => {
    const cls = n.type === 'warn' ? ' notice-card--warn' : '';
    ng.innerHTML += `<div class="notice-card${cls}"><div class="notice-card-title">${n.icon || ''} ${n.title || ''}</div><div class="notice-card-body">${nl(n.body)}</div></div>`;
  });

  // 2. 예약현황
  const sw = document.getElementById('status-wrap'); sw.innerHTML = '';
  (d.status || []).forEach(s => {
    sw.innerHTML += `<div class="status-item status-${s.type}"><div class="status-dot">${STATUS_ICONS[s.type] || '✅'}</div><div class="status-label">${s.label || ''}</div><div class="status-desc">${s.desc || ''}</div></div>`;
  });

  // 3. 진행방식
  const steps = document.getElementById('steps'); steps.innerHTML = '';
  (d.process || []).forEach((p, i) => {
    steps.innerHTML += `<div class="step"><div class="step-num">${i+1}</div><div class="step-content"><h4>${p.title || ''}</h4><p>${nl(p.body)}</p></div></div>`;
  });

  // 4. 협업작가
  const cg = document.getElementById('collab-grid'); cg.innerHTML = '';
  ((d.collab && d.collab.items) || []).forEach(c => {
    const img = c.image
      ? `<img class="collab-img" src="${c.image}" alt="${c.name || ''}">`
      : `<div class="collab-img-empty">이미지</div>`;
    const nameEl = c.link
      ? `<a href="${c.link}" target="_blank" style="text-decoration:none;color:inherit;"><div class="collab-name" style="cursor:pointer;text-decoration:underline;text-underline-offset:3px;">${c.name || ''}</div></a>`
      : `<div class="collab-name">${c.name || ''}</div>`;
    cg.innerHTML += `<div class="collab-card">${img}<div class="collab-info">${nameEl}<div class="collab-label">협업 혜택</div><div class="collab-main">${c.main_desc || ''}</div><div class="collab-label" style="margin-top:6px;">설명</div><div class="collab-sub">${c.sub_desc || ''}</div></div></div>`;
  });

  // 5. 가격표
  document.getElementById('price-h1').textContent = sec.price.head1;
  document.getElementById('price-h2').textContent = sec.price.head2;
  document.getElementById('price-h3').textContent = sec.price.head3;
  const noteEl = document.getElementById('price-note');
  noteEl.innerHTML = nl(sec.price.note);
  noteEl.style.display = sec.price.note ? '' : 'none';
  const tb = document.getElementById('price-tbody'); tb.innerHTML = '';
  let lastCat = '';
  (d.price || []).forEach(p => {
    if (p.category && p.category !== lastCat) {
      tb.innerHTML += `<tr class="price-cat"><td colspan="3">${p.category}</td></tr>`;
      lastCat = p.category;
    }
    const badge = p.badge ? `<span class="price-badge">${p.badge}</span>` : '';
    tb.innerHTML += `<tr><td>${p.item || ''}${badge}</td><td class="price-sub">${p.desc || ''}</td><td>${p.price || ''}</td></tr>`;
  });

  // 6. 샘플
  const sg = document.getElementById('sample-grid'); sg.innerHTML = '';
  (d.samples || []).forEach(s => {
    const embedId = getYoutubeId(s.url);
    let media;
    if (embedId) media = `<div class="sample-video"><iframe src="https://www.youtube.com/embed/${embedId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
    else if (s.thumb) media = `<img class="sample-thumb" src="${s.thumb}" alt="${s.title || ''}">`;
    else media = `<div class="sample-thumb-empty">[ 샘플 URL을 입력해 주세요 ]</div>`;
    sg.innerHTML += `<div class="sample-card">${media}<div class="sample-title">${s.title || ''}</div></div>`;
  });

  // 7. FAQ
  const fl = document.getElementById('faq-list'); fl.innerHTML = '';
  (d.faq || []).forEach(f => {
    fl.innerHTML += `<div class="faq-item"><div class="faq-q"><div class="faq-q-mark">Q</div>${f.question || ''}</div><div class="faq-a"><div class="faq-a-mark">A</div>${f.answer || ''}</div></div>`;
  });

  // 8. 환불
  document.getElementById('refund-h1').textContent = sec.refund.head1;
  document.getElementById('refund-h2').textContent = sec.refund.head2;
  document.getElementById('refund-intro').innerHTML = nl(d.refund && d.refund.intro);
  const rt = document.getElementById('refund-tbody'); rt.innerHTML = '';
  ((d.refund && d.refund.rows) || []).forEach(r => {
    const cls = r.type === 'full' ? 'refund-full' : r.type === 'none' ? 'refund-none' : 'refund-partial';
    rt.innerHTML += `<tr><td>${r.stage || ''}</td><td class="${cls}">${r.rate || ''}</td></tr>`;
  });

  // 테마 적용 완료 → 화면 표시
  document.body.classList.add('ready');

  // 9. 신청 양식
  renderApply(d.apply || {}, sec.apply, d.price);

  // 테마 적용 완료 → 화면 표시
  document.body.classList.add('ready');

  // iframe 높이 전달
  window.parent.postMessage({ height: document.body.scrollHeight }, '*');
});

/* ---------- 신청 양식 ---------- */
let APPLY_FIELDS = [];
let QUOTE = [];

function parsePrice(str) {
  const m = String(str || '').replace(/,/g, '').match(/\d+/);
  return m ? parseInt(m[0], 10) : null;   // 숫자가 없으면 '문의 필요'
}
const won = n => n.toLocaleString('ko-KR') + '원';

function renderQuote(priceList, opts, enabled) {
  opts = opts || {};
  QUOTE = [];
  const wrapEl = document.getElementById('quote-wrap');
  if (enabled === false) { wrapEl.style.display = 'none'; return; }
  (priceList || []).forEach(function(p) {
    const key = (p.category || '') + '§' + (p.item || '');
    const mode = opts[key] || 'hidden';
    if (mode === 'hidden') return;
    QUOTE.push({
      key: key, cat: p.category || '기타', name: p.item || '',
      desc: p.desc || '', raw: p.price || '', amount: parsePrice(p.price),
      mode: mode, qty: mode === 'base' ? 1 : 0
    });
  });

  const wrap = document.getElementById('quote-wrap');
  if (!QUOTE.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';

  const cats = [];
  QUOTE.forEach(function(q) { if (q.mode !== 'base' && cats.indexOf(q.cat) === -1) cats.push(q.cat); });

  document.getElementById('quote-options').innerHTML = cats.map(function(c) {
    const rows = QUOTE.map(function(q, i) {
      if (q.mode === 'base' || q.cat !== c) return '';
      const price = q.amount === null ? '문의 필요' : '+' + won(q.amount);
      const label = '<span class="qrow-label">' + q.name +
        (q.desc ? '<small>' + q.desc + '</small>' : '') + '</span>';
      if (q.mode === 'qty') {
        return '<div class="qrow" id="qr-' + i + '">' + label +
          '<span class="qrow-price">' + price + (q.amount !== null ? ' / 개' : '') + '</span>' +
          '<div class="qty-box"><button type="button" data-q="' + i + '" data-d="-1">−</button>' +
          '<span id="qn-' + i + '">0</span>' +
          '<button type="button" data-q="' + i + '" data-d="1">+</button></div></div>';
      }
      return '<label class="qrow" id="qr-' + i + '">' +
        '<input type="checkbox" data-c="' + i + '">' + label +
        '<span class="qrow-price">' + price + '</span></label>';
    }).join('');
    return '<div class="qgroup"><div class="qgroup-name">' + c + '</div>' + rows + '</div>';
  }).join('');

  const opt = document.getElementById('quote-options');
  opt.querySelectorAll('input[type=checkbox]').forEach(function(cb) {
    cb.onchange = function() {
      const i = +cb.getAttribute('data-c');
      QUOTE[i].qty = cb.checked ? 1 : 0;
      document.getElementById('qr-' + i).classList.toggle('on', cb.checked);
      calcQuote();
    };
  });
  opt.querySelectorAll('button[data-q]').forEach(function(b) {
    b.onclick = function() {
      const i = +b.getAttribute('data-q');
      QUOTE[i].qty = Math.max(0, QUOTE[i].qty + (+b.getAttribute('data-d')));
      document.getElementById('qn-' + i).textContent = QUOTE[i].qty;
      document.getElementById('qr-' + i).classList.toggle('on', QUOTE[i].qty > 0);
      calcQuote();
    };
  });
  calcQuote();
}

function quoteLines() {
  const lines = [];
  let total = 0, ask = false;
  QUOTE.forEach(function(q) {
    if (!q.qty) return;
    if (q.amount === null) {
      ask = true;
      lines.push({ n: q.name + (q.mode === 'qty' && q.qty > 1 ? ' ×' + q.qty : ''), a: q.raw || '문의 필요' });
      return;
    }
    const amt = q.amount * q.qty;
    total += amt;
    lines.push({ n: q.name + (q.mode === 'qty' && q.qty > 1 ? ' ×' + q.qty : ''), a: won(amt) });
  });
  return { lines: lines, total: total, ask: ask };
}

function calcQuote() {
  const r = quoteLines();
  document.getElementById('quote-lines').innerHTML = r.lines.length
    ? r.lines.map(function(l) { return '<div class="quote-line">' + l.n + '<b>' + l.a + '</b></div>'; }).join('')
    : '<div class="quote-line" style="border:none;">선택된 항목이 없어요.<b>-</b></div>';
  document.getElementById('quote-total').textContent = won(r.total);
  const notes = [];
  if (r.ask) notes.push('※ 「문의 필요」 항목은 상담 후 견적에 반영됩니다.');
  notes.push(window.__quoteNote || '※ 예상 금액이며 최종 견적은 문의 후 확정됩니다.');
  document.getElementById('quote-note').innerHTML =
    notes.map(function(t) { return '<div>' + nl(t) + '</div>'; }).join('');
}

function renderApply(ap, secApply, priceList) {
  APPLY_FIELDS = ap.fields || [];
  window.__quoteNote = ap.quote_note || '';
  renderQuote(priceList, ap.priceOpts, ap.quote !== false);
  const intro = document.getElementById('apply-intro');
  intro.innerHTML = nl(ap.intro);
  intro.style.display = ap.intro ? '' : 'none';

  const wrap = document.getElementById('apply-fields');
  wrap.innerHTML = APPLY_FIELDS.map(function(f, i) {
    const multi = f.type === 'multi' ? '<span class="label-multi">(복수 선택 가능)</span>' : '';
    const label = '<label>' + (f.label || '') + multi + '</label>';
    const hint = f.hint ? '<div class="afield-hint">' + f.hint + '</div>' : '';
    let body = '';
    if (f.type === 'textarea') {
      body = '<textarea id="af-' + i + '" placeholder="' + (f.placeholder || '') + '"></textarea>';
    } else if (f.type === 'select' || f.type === 'multi') {
      const opts = (f.options || []).map(function(o, j) {
        return '<button type="button" class="pill" data-f="' + i + '" data-o="' + j + '">' + o + '</button>';
      }).join('');
      body = '<div class="pillrow" id="af-' + i + '" data-multi="' + (f.type === 'multi' ? '1' : '0') + '">' + opts + '</div>';
    } else {
      body = '<input type="text" id="af-' + i + '" placeholder="' + (f.placeholder || '') + '">';
    }
    return '<div class="afield">' + label + body + hint + '</div>';
  }).join('');

  wrap.querySelectorAll('.pill').forEach(function(p) {
    p.onclick = function() {
      const row = p.parentElement;
      if (row.getAttribute('data-multi') !== '1') {
        row.querySelectorAll('.pill').forEach(function(x) { x.classList.remove('on'); });
      }
      p.classList.toggle('on');
    };
  });

  const agreeWrap = document.getElementById('apply-agree-wrap');
  document.getElementById('apply-agree-text').textContent = ap.agree || '';
  agreeWrap.style.display = ap.agree ? 'flex' : 'none';
  document.getElementById('apply-agree').checked = false;

  window.__applyTitle = (secApply && secApply.title) || '신청 양식';
  window.__applyNeedAgree = !!ap.agree;
}

function applyToast(msg, err) {
  const t = document.getElementById('apply-toast');
  t.textContent = msg;
  t.classList.toggle('err', !!err);
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function applyValue(f, i) {
  const el = document.getElementById('af-' + i);
  if (!el) return '';
  if (f.type === 'select' || f.type === 'multi') {
    return Array.from(el.querySelectorAll('.pill.on')).map(function(p) { return p.textContent; }).join(', ');
  }
  return el.value.trim();
}

document.getElementById('apply-copy').addEventListener('click', function() {
  if (window.__applyNeedAgree && !document.getElementById('apply-agree').checked) {
    applyToast('동의 항목에 체크해 주세요.', true);
    return;
  }
  const DIV = '─────────────────';
  const lines = ['[ ' + (window.__applyTitle || '신청 양식') + ' ]', DIV];
  APPLY_FIELDS.forEach(function(f, i) {
    const v = applyValue(f, i);
    lines.push((f.label || '') + ' : ' + (v || '-'));
  });
  if (QUOTE.length) {
    const r = quoteLines();
    lines.push(DIV, '■ 신청 내역');
    if (r.lines.length) r.lines.forEach(function(l) { lines.push('· ' + l.n + ' : ' + l.a); });
    else lines.push('· (선택 없음)');
    lines.push(DIV, '■ 예상 견적 합계 : ' + won(r.total));
    if (r.ask) lines.push('※ 「문의 필요」 항목은 상담 후 반영됩니다.');
  }
  const text = lines.join('\n');
  navigator.clipboard.writeText(text)
    .then(function() { applyToast('복사됐어요! 문의처에 붙여넣어 주세요.'); })
    .catch(function() {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); applyToast('복사됐어요!'); }
      catch (e) { applyToast('복사에 실패했어요. 직접 선택해 복사해 주세요.', true); }
      document.body.removeChild(ta);
    });
});

document.getElementById('apply-reset').addEventListener('click', function() {
  APPLY_FIELDS.forEach(function(f, i) {
    const el = document.getElementById('af-' + i);
    if (!el) return;
    if (f.type === 'select' || f.type === 'multi') el.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('on'); });
    else el.value = '';
  });
  QUOTE.forEach(function(q, i) {
    if (q.mode === 'base') return;
    q.qty = 0;
    const n = document.getElementById('qn-' + i); if (n) n.textContent = '0';
    const r = document.getElementById('qr-' + i); if (r) r.classList.remove('on');
  });
  document.querySelectorAll('#quote-options input[type=checkbox]').forEach(function(c) { c.checked = false; });
  if (QUOTE.length) calcQuote();
  const ag = document.getElementById('apply-agree');
  if (ag) ag.checked = false;
  applyToast('초기화됐어요.');
});

// DB 응답이 없어도 3초 뒤엔 표시 (네트워크 실패 대비)
setTimeout(function() { document.body.classList.add('ready'); }, 3000);

onValue(ref(db, '_sites'), function(snap) {
  const list = snap.val() || {};
  const me = list[SITE_KEY];

  // 비공개 사이트 → 안내 화면으로 대체
  if (me && me.published === false) {
    window.__private = true;
    document.querySelector('.page').innerHTML =
      '<div class="private">' +
        '<div class="private-icon">🔒</div>' +
        '<h2>비공개 상태입니다</h2>' +
        '<p>이 커미션은 현재 공개되지 않았어요.<br>잠시 후 다시 확인해 주세요.</p>' +
        '<a href="index.html">← 커미션 목록으로</a>' +
      '</div>';
    document.body.classList.add('ready');
    window.parent.postMessage({ height: document.body.scrollHeight }, '*');
    return;
  }

  // 공개된 커미션이 2개 이상일 때만 "목록으로" 버튼 표시
  const count = Object.keys(list)
    .filter(k => list[k] && list[k].visible !== false && list[k].published !== false).length;
  if (count < 2) return;
  const bb = document.getElementById('back-btn');
  const fb = document.getElementById('footer-back');
  if (bb) bb.style.display = 'inline-flex';
  if (fb) fb.style.display = 'block';
  window.parent.postMessage({ height: document.body.scrollHeight }, '*');
}, { onlyOnce: true });

// iframe 스크롤 제어
window.addEventListener('message', e => {
  if (!e.data) return;
  if (e.data.scrollTo === 'top') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  if (e.data.scrollTo) {
    const el = document.getElementById(e.data.scrollTo);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});
</script>
